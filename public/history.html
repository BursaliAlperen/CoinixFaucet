<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>History - COINIX</title>
  <meta http-equiv="refresh" content="2; url=/withdraw">
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; --accent: #fbbf24; --border: #334155; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { margin-top: 16px; color: var(--muted); font-size: 14px; }
    a { color: var(--accent); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Redirecting to withdrawal history...</p>
  <p style="margin-top:8px; font-size:12px;"><a href="/withdraw">Click here if not redirected</a></p>
  <script>setTimeout(() => { location.href = '/withdraw'; }, 500);</script>
</body>
</html>
