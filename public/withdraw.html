    }
    .hamburger:hover { background: #f3f4f6; }
    .hamburger span { display: block; width: 20px; height: 2.5px; background: #374151; border-radius: 2px; transition: all 0.2s ease; }
    .hamburger.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }

    .profile-wrap { display: flex; align-items: center; gap: 10px; min-width: 0; }

    .profile-info { min-width: 0; overflow: hidden; }

    .stat-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 800; color: #1f2937; }

    .stat-sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
    .swap-box {
      background: #f9fafb; border: 1.5px solid #e5e7eb;

    }
    .swap-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .swap-row label { font-size: 12px; font-weight: 600; color: #6b7280; min-width: 50px; }
    .swap-row input { flex: 1; margin-bottom: 0; }
    .swap-token {
      display: flex; align-items: center; gap: 6px;
      background: #fff; border: 1px solid #d1d5db;
      padding: 8px 12px; border-radius: 8px;
      font-size: 13px; font-weight: 600; color: #374151;
    }
    .swap-token svg { width: 20px; height: 20px; }
    .swap-arrow {
      text-align: center; margin: 10px 0;
      color: #9ca3af;
    }
    .swap-arrow svg { width: 24px; height: 24px; }
    .swap-rate { text-align: center; font-size: 12px; color: #6b7280; margin-bottom: 14px; }
    .history-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .history-table th, .history-table td { padding: 10px 8px; text-align: left; border-bottom: 1px solid #e5e7eb; }
    .history-table th { color: #6b7280; font-weight: 600; font-size: 11px; text-transform: uppercase; }
    .history-table tr:hover { background: #f9fafb; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-orange { background: #ffedd5; color: #9a3412; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .empty-state { text-align: center; padding: 30px; color: #9ca3af; }
    .empty-state svg { width: 40px; height: 40px; margin-bottom: 8px; }
    @media (max-width: 400px) {
      .container { padding: 12px; }
      .card { padding: 16px; }
      .stats-grid { grid-template-columns: 1fr; }
      .balance-wrap { padding: 6px 10px; }
      .balance-text { font-size: 13px; }
      .history-table { font-size: 11px; }
      .history-table th, .history-table td { padding: 8px 4px; }
    }
  </style><script src="https://telegram.org/js/telegram-web-app.js"></script>

  <defs>
    <linearGradient id="cnxGrad" x1="0" y1="0" x2="32" y2="32">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="cnxShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.25"/>

  </defs>
  <circle cx="16" cy="16" r="14" fill="url(#cnxGrad)" filter="url(#cnxShadow)"/>
  <circle cx="16" cy="16" r="11" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
  <text x="16" y="20.5" text-anchor="middle" font-size="10" font-weight="800" fill="#fff" font-family="Arial, sans-serif" letter-spacing="0.5">CNX</text>
</svg><div class="balance-text"><span id="bal">0</span> CNX</div></div>

  <div class="container">
  <div class="card">
    <div class="section-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
      Withdraw
    </div>
    <label class="label">FaucetPay Email or CNX Address</label>
    <input type="text" id="wdAddress" placeholder="Enter your address">
    <label class="label">Amount (CNX)</label>
    <input type="number" id="wdAmount" placeholder="Min 1 CNX">
    <button class="action" onclick="doWithdraw()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      Request Withdrawal
    </button>
    <div class="msg" id="wdMsg"></div>
  </div></div><script>
    const API = window.location.origin;
    let userId = null;
    let lastClaim = 0;
    let cooldownTimer = null;

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      const hamburger = document.getElementById('hamburger');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('open');
      hamburger.classList.toggle('open');
    }

    function init() {
      let user = null;
      if (window.Telegram && Telegram.WebApp && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {
        user = Telegram.WebApp.initDataUnsafe.user;
        userId = String(user.id);
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
      } else {
        userId = 'test_' + Math.floor(Math.random() * 100000);
      }
      if (user) {
        if (user.photo_url) document.getElementById('profileImg').src = user.photo_url;
        const name = user.username ? '@' + user.username : (user.first_name || 'User');
        document.getElementById('profileName').textContent = name;
        document.getElementById('profileId').textContent = 'ID: ' + userId;
      } else {
        document.getElementById('profileName').textContent = 'Test User';
        document.getElementById('profileId').textContent = 'ID: ' + userId;
      }
      loadBalance();
    }

    async function loadBalance() {
      if (!userId) return;
      try {
        const res = await fetch(API + '/api/balance/' + userId);
        const data = await res.json();
        const balEl = document.getElementById('bal');
        if (balEl) balEl.textContent = data.balance;
        const dogeEl = document.getElementById('dogeBal');
        if (dogeEl) dogeEl.textContent = (data.doge_balance || 0).toFixed(2);
        lastClaim = data.last_claim || 0;
        if (document.getElementById('claimBtn')) updateCooldown();
      } catch (e) { console.error(e); }
    }

    function updateCooldown() {
      const now = Date.now();
      const diff = now - lastClaim;
      const btn = document.getElementById('claimBtn');
      const txt = document.getElementById('cooldownText');
      if (!btn || !txt) return;
      if (diff < 10000) {
        const wait = Math.ceil((10000 - diff) / 1000);
        btn.disabled = true;
        txt.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Wait ' + wait + 's...';
        if (!cooldownTimer) cooldownTimer = setInterval(updateCooldown, 1000);
      } else {
        btn.disabled = false;
        txt.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg> Ready to claim!';
        if (cooldownTimer) { clearInterval(cooldownTimer); cooldownTimer = null; }
      }
    }

    async function doClaim() {
      if (!userId) return;
      const btn = document.getElementById('claimBtn');
      btn.disabled = true;
      try {
        const res = await fetch(API + '/api/claim', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('bal').textContent = data.balance;
          lastClaim = Date.now(); updateCooldown();
          document.getElementById('cooldownText').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> You won ' + data.reward + ' CNX!';
        } else {
          document.getElementById('cooldownText').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> ' + (data.error || 'Error');
        }
      } catch (e) {
        document.getElementById('cooldownText').innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> Network error';
      }
    }

    async function doWithdraw() {
      if (!userId) return;
      const amount = document.getElementById('wdAmount').value;
      const address = document.getElementById('wdAddress').value;
      const msg = document.getElementById('wdMsg');
      if (!amount || !address) {
        msg.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> Fill all fields';
        msg.className = 'msg err'; return;
      }
      try {
        const res = await fetch(API + '/api/withdraw', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, amount: Number(amount), address })
        });
        const data = await res.json();
        if (data.success) {
          msg.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><polyline points="20 6 9 17 4 12"></polyline></svg> Withdrawal requested! Awaiting admin approval.';
          msg.className = 'msg'; loadBalance();
        } else {
          msg.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> ' + (data.error || 'Failed');
          msg.className = 'msg err';
        }
      } catch (e) {
        msg.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg> Network error';
        msg.className = 'msg err';
      }
    }

    window.onload = init;
  </script></body></html>
