<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dashboard - COINIX</title>
  <style>
    :root {
      --bg: #f0f2f5; --card: #fff; --text: #222; --muted: #6b7280;
      --accent: #fbbf24; --success: #16a34a; --danger: #dc2626;
      --border: #e5e7eb; --shadow: 0 1px 3px rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; --border: #334155; --shadow: 0 1px 3px rgba(0,0,0,0.3); }
      .topbar { background: #1e293b !important; border-color: #334155 !important; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .topbar { display: flex; align-items: center; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; gap: 12px; }
    .back-btn { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: none; background: none; cursor: pointer; }
    .back-btn:hover { background: #f3f4f6; }
    .topbar h1 { font-size: 16px; font-weight: 700; }
    .container { max-width: 540px; margin: 0 auto; padding: 16px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.07); }
    .stat-card.full { grid-column: 1 / -1; }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 800; color: var(--text); }
    .stat-value.accent { color: var(--accent); }
    .stat-value.success { color: var(--success); }
    .stat-value.danger { color: var(--danger); }
    .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .loading-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.3s; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>
  <div class="topbar">
    <button class="back-btn" onclick="history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
    </button>
    <h1>Dashboard</h1>
  </div>
  <div class="container">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card full">
        <div class="stat-label">Current Balance</div>
        <div class="stat-value accent" id="stBalance">0 CNX</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Earnings (USD)</div>
        <div class="stat-value" id="stUsd">$0.00</div>
        <div class="stat-sub">1 CNX ≈ $0.001</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">CNX Earned</div>
        <div class="stat-value success" id="stCnx">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">DOGE Earned</div>
        <div class="stat-value" id="stDoge">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Claims Completed</div>
        <div class="stat-value" id="stClaims">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Withdrawals Completed</div>
        <div class="stat-value" id="stWithdrawals">0</div>
      </div>
    </div>
  </div>
  <script>
    const API = window.location.origin;
    async function init() {
      if (window.Telegram && Telegram.WebApp) Telegram.WebApp.ready();
      let userId = null;
      if (window.Telegram && Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {
        userId = String(Telegram.WebApp.initDataUnsafe.user.id);
      }
      if (!userId) { document.getElementById('loadingOverlay').classList.add('hidden'); return; }
      try {
        const res = await fetch(API + '/api/stats/user/' + userId);
        const d = await res.json();
        document.getElementById('stBalance').textContent = (d.balance || 0) + ' CNX';
        document.getElementById('stCnx').textContent = d.earned || 0;
        document.getElementById('stUsd').textContent = '$' + ((d.earned || 0) * 0.001).toFixed(2);
        document.getElementById('stClaims').textContent = d.claims || 0;
        document.getElementById('stWithdrawals').textContent = d.withdrawn || 0;
      } catch (e) { console.error(e); }
      try {
        const res2 = await fetch(API + '/api/balance/' + userId);
        const d2 = await res2.json();
        document.getElementById('stDoge').textContent = d2.doge_balance || 0;
      } catch (e) { console.error(e); }
      document.getElementById('loadingOverlay').classList.add('hidden');
    }
    window.onload = init;
  </script>
</body>
</html>
